spring.application.name=demo
# Configuraçőes do H2 Database
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Configuraçőes do DataSource (como o Spring se conecta ao banco de dados)
spring.datasource.url=jdbc:h2:mem:tasksdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Configuraçőes do JPA/Hibernate (como o Spring Data JPA interage com o banco de dados)
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
server.port=8081